<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Listables</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',     /* Admin sidebar is a slightly lighter red than main primary */
                        secondary: '#F5F5F5',
                        dark: '#000000',
                        light: '#FFFFFF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="styles.css">
    <!-- Inline styles for admin layout specifics if needed -->
    <style>
        .admin-sidebar {
            background-color: #FF5A5F;
        }

        .admin-sidebar-active {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="font-sans antialiased text-gray-900 bg-secondary min-h-screen flex">

    <!-- Admin Sidebar -->
    <aside class="w-64 admin-sidebar text-white flex flex-col fixed h-full z-10 transition-transform">
        <div class="h-[88px] flex items-center px-8 bg-white text-black mb-8 border-r border-gray-200">
            <a href="#" class="text-xl font-bold tracking-tight">Listables <span
                    class="text-xs font-normal ml-1">Admin</span></a>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <!-- Active link -->
            <a href="admin-dashboard.html"
                class="flex items-center px-4 py-3 admin-sidebar-active rounded-md text-white font-medium transition">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                Dashboard
            </a>

            <a href="admin-users.html"
                class="flex items-center px-4 py-3 text-white hover:bg-white/10 rounded-md font-medium transition">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
                Users
            </a>

            <a href="admin-listings.html"
                class="flex items-center px-4 py-3 text-white hover:bg-white/10 rounded-md font-medium transition">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                </svg>
                Listings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
        <!-- Header text -->
        <h1 class="text-3xl font-bold text-black mb-6 mt-[64px] pl-4">Dashboard Overview</h1>

        <!-- Stats Cards Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 px-4">
            <!-- Card 1 -->
            <div class="bg-black text-white rounded-xl p-6 flex flex-col justify-center">
                <p class="text-sm font-medium text-gray-300 mb-1">Total Commission</p>
                <p class="text-3xl font-bold">EGP 150,000</p>
            </div>
            <!-- Card 2 -->
            <div class="bg-black text-white rounded-xl p-6 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-300 mb-1">Active Users</p>
                    <p class="text-3xl font-bold">2450</p>
                </div>
                <!-- Icon -->
                <div class="bg-white/10 p-3 rounded-lg">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="bg-black text-white rounded-xl p-6 flex flex-col justify-center">
                <p class="text-sm font-medium text-gray-300 mb-1">New Listings</p>
                <p class="text-3xl font-bold">120</p>
            </div>
        </div>

        <!-- Recent Activity Container -->
        <div class="px-4">
            <div class="bg-black text-white rounded-xl pt-6 px-6 pb-20 min-h-[400px]">
                <h2 class="text-2xl font-bold mb-6">Recent Activity</h2>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-700 text-sm font-semibold">
                                <th class="pb-3 pt-2 font-bold w-1/3">Action</th>
                                <th class="pb-3 pt-2 font-bold w-1/4">User</th>
                                <th class="pb-3 pt-2 font-bold w-1/4">Date</th>
                                <th class="pb-3 pt-2 font-bold">Status</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm font-light">
                            <tr class="border-b border-gray-800 hover:bg-gray-900/50 transition">
                                <td class="py-4">New Listing: Iphone 13</td>
                                <td class="py-4">Ahmed88</td>
                                <td class="py-4">26/10/2025</td>
                                <td class="py-4">Pending</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
